<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, maximum-scale=1">
<title>Dial - Stack - macremote</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Familjen+Grotesk:wght@500;600;700&family=Archivo+Black&display=swap" rel="stylesheet">
<style>
  :root{
    --ink:#0B0E12;
    --panel:#12161c;
    --panel-2:#171c23;
    --line:rgba(245,244,239,.09);
    --line-strong:rgba(245,244,239,.16);
    --off:#F5F4EF;
    --dim:rgba(245,244,239,.56);
    --faint:rgba(245,244,239,.32);
    --green:#4ADE80;
    --green-dim:rgba(74,222,128,.32);
    --ease:cubic-bezier(.16,1,.3,1);
  }
  *,*::before,*::after{ box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
  html,body{ height:100%; margin:0; }
  body{
    background:var(--ink);
    color:var(--off);
    font-family:"Familjen Grotesk",ui-sans-serif,system-ui,sans-serif;
    -webkit-font-smoothing:antialiased;
    overflow:hidden;
    position:fixed; inset:0; width:100%; height:100dvh;
    user-select:none; -webkit-user-select:none;
    display:flex; align-items:center; justify-content:center;
  }
  .tabular{ font-variant-numeric:tabular-nums; }

  .phone{
    position:relative;
    width:100%; max-width:430px; height:100%; max-height:100dvh;
    display:flex; flex-direction:column;
    background:
      radial-gradient(120% 70% at 50% -10%, rgba(74,222,128,.05), transparent 55%),
      var(--ink);
  }

  .statusbar{
    display:flex; align-items:center; justify-content:space-between;
    padding:max(14px, env(safe-area-inset-top)) 20px 10px;
    font-size:11px; font-weight:600; letter-spacing:.02em;
    color:var(--faint);
    border-bottom:1px solid var(--line);
    flex:none;
  }
  .sb-dot{ display:inline-block; width:5px; height:5px; border-radius:50%; background:var(--green); box-shadow:0 0 6px rgba(74,222,128,.7); margin-right:6px; }
  .sb-right{ display:flex; align-items:center; }

  .head{ text-align:center; padding:16px 0 4px; flex:none; }
  .head-label{ font-size:12px; font-weight:700; letter-spacing:.14em; text-transform:uppercase; color:var(--faint); }
  .head-sub{ font-size:11.5px; color:var(--faint); margin-top:3px; }

  .stack{
    flex:1; min-height:0; overflow-y:auto;
    padding:14px 18px 18px;
    display:flex; flex-direction:column; gap:12px;
    -webkit-overflow-scrolling:touch;
  }
  .stack::-webkit-scrollbar{ width:0; }

  .card{
    display:flex; align-items:center; gap:16px;
    background:var(--panel); border:1px solid var(--line);
    border-radius:20px; padding:14px 16px;
    flex:none;
  }

  .mini-wrap{ position:relative; width:78px; height:78px; flex:none; touch-action:none; }
  .mini{
    position:absolute; inset:0; border-radius:50%;
    background:radial-gradient(circle at 32% 26%, var(--panel-2) 0%, #0c0f13 68%);
    box-shadow:
      inset 0 1px 1px rgba(255,255,255,.06),
      inset 0 -10px 18px rgba(0,0,0,.5),
      0 8px 16px -8px rgba(0,0,0,.6),
      0 0 0 1px rgba(255,255,255,.03);
    cursor:grab;
  }
  .mini:active{ cursor:grabbing; }
  .mini-svg{ position:absolute; inset:0; width:100%; height:100%; overflow:visible; pointer-events:none; }
  .track{ fill:none; stroke:rgba(245,244,239,.09); stroke-width:7; stroke-linecap:round; }
  .fill{ fill:none; stroke:var(--green); stroke-width:7; stroke-linecap:round; filter:drop-shadow(0 0 5px rgba(74,222,128,.5)); }
  .mini-pct{
    position:absolute; inset:0; display:flex; align-items:center; justify-content:center;
    font-family:"Archivo Black",sans-serif; font-size:16px; color:var(--off); pointer-events:none;
  }
  .mini-pct .sign{ font-size:.5em; color:var(--dim); margin-left:1px; }

  .card-info{ flex:1; min-width:0; }
  .card-name{ font-size:15px; font-weight:700; color:var(--off); white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
  .card-note{ display:flex; align-items:center; gap:5px; font-size:11px; font-weight:600; color:var(--faint); margin-top:4px; letter-spacing:.01em; }
  .card-note::before{ content:""; width:5px; height:5px; border-radius:50%; background:var(--faint); flex:none; }
  .card-note.hw{ color:rgba(74,222,128,.85); }
  .card-note.hw::before{ background:var(--green); box-shadow:0 0 5px rgba(74,222,128,.6); }
  .card-bar{ margin-top:9px; height:4px; border-radius:999px; background:rgba(245,244,239,.08); overflow:hidden; }
  .card-bar-fill{ height:100%; background:var(--green); border-radius:999px; transition:width .08s linear; }

  .foot{
    flex:none; text-align:center;
    padding:10px 16px calc(16px + env(safe-area-inset-bottom));
    font-size:10.5px; color:var(--faint); border-top:1px solid var(--line);
  }

  @media (prefers-reduced-motion: reduce){
    *{ transition-duration:80ms !important; animation-duration:.001ms !important; }
  }
</style>
</head>
<body>
  <div class="phone">
    <div class="statusbar">
      <span>macremote</span>
      <span class="sb-right"><span class="sb-dot"></span>Tejas's iMac</span>
    </div>

    <div class="head">
      <span class="head-label">Brightness</span>
      <div class="head-sub">Every display, one screen</div>
    </div>

    <div class="stack" id="stack"></div>

    <div class="foot">Drag any dial to set that display</div>
  </div>

<script>
(function(){
  "use strict";

  var CX = 50, CY = 50;
  var SWEEP_START = 215;
  var SWEEP_TOTAL = 290;
  var TRACK_R = 40;

  function polarToXY(r, deg){
    var rad = deg * Math.PI / 180;
    return [ CX + r * Math.sin(rad), CY - r * Math.cos(rad) ];
  }
  function arcPath(r, startDeg, sweepDeg){
    if (sweepDeg <= 0.0001) return "";
    sweepDeg = Math.min(sweepDeg, 359.9);
    var p1 = polarToXY(r, startDeg);
    var p2 = polarToXY(r, startDeg + sweepDeg);
    var large = sweepDeg > 180 ? 1 : 0;
    return "M " + p1[0].toFixed(2) + " " + p1[1].toFixed(2) +
      " A " + r + " " + r + " 0 " + large + " 1 " + p2[0].toFixed(2) + " " + p2[1].toFixed(2);
  }
  function compassFromEvent(clientX, clientY, rect){
    var cx = rect.left + rect.width / 2;
    var cy = rect.top + rect.height / 2;
    var dx = clientX - cx, dy = clientY - cy;
    var deg = Math.atan2(dx, -dy) * 180 / Math.PI;
    return (deg + 360) % 360;
  }
  function compassToValue(compass){
    var swept = (compass - SWEEP_START + 360) % 360;
    if (swept <= SWEEP_TOTAL) return Math.max(0, Math.min(100, swept / SWEEP_TOTAL * 100));
    var distToEnd = swept - SWEEP_TOTAL;
    var distToStart = 360 - swept;
    return distToEnd < distToStart ? 100 : 0;
  }

  var displays = [
    { id:"builtin", name:"Built-in", brightness:70, method:"hardware" },
    { id:"benq", name:"BenQ EX2710S", brightness:45, method:"software" },
    { id:"lg", name:"LG UltraGear", brightness:100, method:"software" }
  ];

  var stack = document.getElementById("stack");

  displays.forEach(function(d, idx){
    var card = document.createElement("div");
    card.className = "card";
    card.innerHTML =
      '<div class="mini-wrap" data-idx="' + idx + '">' +
        '<div class="mini">' +
          '<svg class="mini-svg" viewBox="0 0 100 100" aria-hidden="true">' +
            '<path class="track" d=""></path>' +
            '<path class="fill" d=""></path>' +
          '</svg>' +
          '<div class="mini-pct tabular"><span class="val">' + d.brightness + '</span><span class="sign">%</span></div>' +
        '</div>' +
      '</div>' +
      '<div class="card-info">' +
        '<div class="card-name">' + d.name + '</div>' +
        '<div class="card-note' + (d.method === "hardware" ? " hw" : "") + '">' + (d.method === "hardware" ? "Hardware" : "Software dimmed") + '</div>' +
        '<div class="card-bar"><div class="card-bar-fill"></div></div>' +
      '</div>';
    stack.appendChild(card);

    var wrap = card.querySelector(".mini-wrap");
    var mini = card.querySelector(".mini");
    var track = card.querySelector(".track");
    var fill = card.querySelector(".fill");
    var valEl = card.querySelector(".val");
    var barFill = card.querySelector(".card-bar-fill");

    track.setAttribute("d", arcPath(TRACK_R, SWEEP_START, SWEEP_TOTAL));

    function render(v, quiet){
      v = Math.max(0, Math.min(100, v));
      d.brightness = Math.round(v);
      var sweep = v / 100 * SWEEP_TOTAL;
      fill.setAttribute("d", arcPath(TRACK_R, SWEEP_START, sweep));
      valEl.textContent = Math.round(v);
      barFill.style.width = v + "%";
      if (!quiet && navigator.vibrate) navigator.vibrate(2);
    }
    render(d.brightness, true);

    var dragging = false;
    mini.addEventListener("pointerdown", function(e){
      dragging = true;
      mini.setPointerCapture(e.pointerId);
      var rect = mini.getBoundingClientRect();
      var compass = compassFromEvent(e.clientX, e.clientY, rect);
      render(compassToValue(compass));
    });
    mini.addEventListener("pointermove", function(e){
      if (!dragging) return;
      var rect = mini.getBoundingClientRect();
      var compass = compassFromEvent(e.clientX, e.clientY, rect);
      render(compassToValue(compass));
    });
    function endDrag(){ dragging = false; }
    mini.addEventListener("pointerup", endDrag);
    mini.addEventListener("pointercancel", endDrag);
  });
})();
</script>
</body>
</html>
